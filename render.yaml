# Render blueprint — single Docker web service serving API + frontend.
# Deploy: push to GitHub, then New → Blueprint and point at this repo.
services:
  - type: web
    name: threat-intel-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free # change to "starter" ($7/mo) to avoid cold-start sleep
    healthCheckPath: /api/health
    envVars:
      # Required — set the value in the Render dashboard (kept out of git).
      - key: ANTHROPIC_API_KEY
        sync: false
      # Auth — set a password to lock the app; SESSION_SECRET is auto-generated.
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      # Optional — only needed for --backend live / the ThreatFox feed (free keys).
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: THREATFOX_AUTH_KEY
        sync: false
      - key: THREAT_INTEL_MODEL
        value: claude-sonnet-4-6
